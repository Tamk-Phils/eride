<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1A1A1A" />
    <title>eRide | Premium Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('root').innerHTML = '<div style="background: #000; color: #FF3B30; padding: 20px; font-family: monospace;"><h3>Fatal JS Error</h3><p>' + event.message + '</p><p>Line: ' + event.lineno + ' Col: ' + event.colno + '</p></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('root').innerHTML = '<div style="background: #000; color: #FF3B30; padding: 20px; font-family: monospace;"><h3>Unhandled Promise Rejection</h3><p>' + event.reason + '</p></div>';
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; color: #FFD700; font-family: sans-serif;">
        Loading eRide...
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
